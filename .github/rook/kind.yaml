kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    extraMounts:
      - hostPath: /dev
        containerPath: /dev
        propagation: HostToContainer
      - hostPath: /run/udev
        containerPath: /run/udev
        propagation: HostToContainer
  - role: worker
    extraMounts:
      - hostPath: /dev
        containerPath: /dev
        propagation: HostToContainer
      - hostPath: /run/udev
        containerPath: /run/udev
        propagation: HostToContainer
  - role: worker
    extraMounts:
      - hostPath: /dev
        containerPath: /dev
        propagation: HostToContainer
      - hostPath: /run/udev
        containerPath: /run/udev
        propagation: HostToContainer
