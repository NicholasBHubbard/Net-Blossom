apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v20.2.2
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 1
    allowMultiplePerNode: false
  dashboard:
    enabled: false
  crashCollector:
    disable: true
  logCollector:
    enabled: false
  monitoring:
    enabled: false
  cleanupPolicy:
    confirmation: ""
  storage:
    storageClassDeviceSets:
      - name: local
        count: 3
        portable: false
        encrypted: false
        placement:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - rook-ceph-osd
                topologyKey: kubernetes.io/hostname
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              resources:
                requests:
                  storage: 8Gi
              storageClassName: blossom-ceph-local
              volumeMode: Block
              accessModes:
                - ReadWriteOnce
  disruptionManagement:
    managePodBudgets: false
  cephConfig:
    global:
      osd_memory_target: "2147483648"
