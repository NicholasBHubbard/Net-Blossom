name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Perl ${{ matrix.perl-version }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        perl-version: ["5.16", "latest"]

    env:
      PERL_CPANM_HOME: ${{ github.workspace }}/.cpanm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Show Perl version
        run: perl -V

      - name: Configure local lib
        run: |
          echo "$GITHUB_WORKSPACE/local/bin" >> "$GITHUB_PATH"
          perl -MConfig -e '
            my $root = $ENV{GITHUB_WORKSPACE};
            print "PERL5LIB=", join(":",
                "$root/dist/Net-Blossom/lib",
                "$root/dist/Net-Blossom-Server/lib",
                "$root/dist/Net-Blossom-Server-Backend-SQLite/lib",
                "$root/local/lib/perl5",
                "$root/local/lib/perl5/$Config::Config{archname}",
                "$root/local/lib/perl5/$Config::Config{version}",
                "$root/local/lib/perl5/$Config::Config{version}/$Config::Config{archname}",
            ), "\n";
          ' >> "$GITHUB_ENV"

      - name: Install client dependencies
        run: cpanm -llocal --notest --with-develop --installdeps ./dist/Net-Blossom

      - name: Install client distribution
        run: cpanm -llocal --notest ./dist/Net-Blossom

      - name: Install server dependencies
        run: cpanm -llocal --notest --with-develop --installdeps ./dist/Net-Blossom-Server

      - name: Install server distribution
        run: cpanm -llocal --notest ./dist/Net-Blossom-Server

      - name: Install SQLite backend dependencies
        run: cpanm -llocal --notest --with-develop --installdeps ./dist/Net-Blossom-Server-Backend-SQLite

      - name: Run tests
        run: prove dist/Net-Blossom/t dist/Net-Blossom/t/bud dist/Net-Blossom-Server/t dist/Net-Blossom-Server-Backend-SQLite/t

      - name: Run author tests
        env:
          AUTHOR_TESTING: 1
        run: AUTHOR_TESTING=1 prove dist/Net-Blossom/xt dist/Net-Blossom-Server/xt dist/Net-Blossom-Server-Backend-SQLite/xt

      - name: Install coverage dependencies
        if: matrix.perl-version == 'latest'
        run: cpanm -llocal --notest Devel::Cover

      - name: Run coverage author tests
        if: matrix.perl-version == 'latest'
        env:
          AUTHOR_TESTING: 1
          COVERAGE_TESTING: 1
        run: COVERAGE_TESTING=1 AUTHOR_TESTING=1 prove dist/Net-Blossom/xt/06-author-coverage.t dist/Net-Blossom-Server/xt/05-author-coverage.t dist/Net-Blossom-Server-Backend-SQLite/xt/04-author-coverage.t
