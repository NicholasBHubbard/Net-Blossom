name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Perl ${{ matrix.perl-version }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        perl-version: ["5.16", "latest"]

    env:
      PERL_CPANM_HOME: ${{ github.workspace }}/.cpanm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Show Perl version
        run: perl -V

      - name: Configure local lib
        run: |
          echo "$GITHUB_WORKSPACE/local/bin" >> "$GITHUB_PATH"
          echo "PERL5LIB=$GITHUB_WORKSPACE/dist/Net-Blossom/lib:$GITHUB_WORKSPACE/dist/Net-Blossom-Server/lib:$GITHUB_WORKSPACE/local/lib/perl5" >> "$GITHUB_ENV"

      - name: Install client dependencies
        run: cpanm -llocal --notest --with-develop --installdeps ./dist/Net-Blossom

      - name: Install client distribution
        run: cpanm -llocal --notest ./dist/Net-Blossom

      - name: Install server dependencies
        run: cpanm -llocal --notest --with-develop --installdeps ./dist/Net-Blossom-Server

      - name: Run tests
        run: prove dist/Net-Blossom/t dist/Net-Blossom/t/bud dist/Net-Blossom-Server/t

      - name: Run author tests
        env:
          AUTHOR_TESTING: 1
        run: AUTHOR_TESTING=1 prove dist/Net-Blossom/xt dist/Net-Blossom-Server/xt
